name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Needed by the release step (softprops/action-gh-release) — the default
# GITHUB_TOKEN is read-only otherwise.
permissions:
  contents: write

jobs:
  test-and-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: egPDF-Setup.exe
            glob: 'release/egPDF Setup *.exe'
            stage: 'egPDF-Setup.exe'
          - os: macos-latest
            artifact: egPDF.dmg
            glob: 'release/*.dmg'
            stage: 'egPDF.dmg'
          - os: ubuntu-latest
            artifact: egPDF.AppImage
            glob: 'release/*.AppImage'
            stage: 'egPDF.AppImage'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: E2E suite (dev build)
        run: npm test

      - name: E2E suite (packaged)
        if: runner.os != 'Linux'   # packaged-app test needs a display bundle
        run: npm run test:packaged

      - name: Build installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: egpdf-${{ matrix.os }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

      # Screenshots + results JSON from both suites — the visual record of
      # what the app actually rendered, kept even when a step fails.
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-evidence-${{ matrix.os }}
          path: test/.out/**
          if-no-files-found: ignore

      # Tag pushes (v*) publish the installer as a GitHub Release. Assets keep
      # version-independent names so the README's latest/download links never
      # go stale.
      - name: Stage release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Copy-Item (Get-ChildItem "${{ matrix.glob }}").FullName "release/${{ matrix.stage }}"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.stage }}
          generate_release_notes: true
